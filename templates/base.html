<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Voluntariado{% endblock %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }

        .navbar {
            background-color: #1f4f82;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 20px;
        }

        .brand-link {
            color: white;
            text-decoration: none;
        }

        .brand-link:hover {
            text-decoration: underline;
        }

        .navbar nav {
            display: flex;
            align-items: center;
        }

        .navbar nav a {
            color: white;
            text-decoration: none;
            margin-left: 16px;
            font-weight: bold;
        }

        .navbar nav a:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: none;
            border: none;
            color: white;
            margin-left: 16px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .logout-btn:hover {
            text-decoration: underline;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .message.success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .message.error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .message.warning {
            background-color: #fef3c7;
            color: #92400e;
        }

        .message.info {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .card {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary {
            background-color: #1f4f82;
            color: white;
        }

        .btn-primary:hover {
            background-color: #163a61;
        }

        .btn-secondary {
            background-color: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #1f4f82;
        }

        .text-center {
            text-align: center;
        }

        .mt-2 {
            margin-top: 12px;
        }

        .mt-3 {
            margin-top: 18px;
        }

        .mt-4 {
            margin-top: 24px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% if user.is_authenticated %}
    <header class="navbar">
        <h1>
            <a href="{% url 'acoes_list' %}" class="brand-link">Sistema de Voluntariado</a>
        </h1>

        <nav>
            {% if not user.is_staff %}
                <a href="{% url 'minhas_inscricoes' %}">Minhas inscrições</a>
            {% endif %}

            <!-- Logout via POST -->
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Sair</button>
            </form>
        </nav>
    </header>
    {% endif %}

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
