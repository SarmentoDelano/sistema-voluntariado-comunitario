{% extends 'base.html' %}

{% block title %}Campanha{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 700px;
        margin: 40px auto;
    }

    .form-header {
        margin-bottom: 24px;
        text-align: center;
    }

    .form-header h2 {
        color: #1f4f82;
        margin-bottom: 8px;
    }

    .form-header p {
        color: #6b7280;
    }

    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
    }

    .form-actions .btn {
        min-width: 140px;
        text-align: center;
    }

    textarea {
        min-height: 120px;
        resize: vertical;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="card">
        <div class="form-header">
            <h2>{{ page_title }}</h2>
            <p>Preencha os dados da campanha.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_nome">Nome</label>
                <input
                    type="text"
                    name="nome"
                    id="id_nome"
                    value="{{ form_data.nome|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="id_descricao">Descrição</label>
                <textarea
                    name="descricao"
                    id="id_descricao"
                    required
                >{{ form_data.descricao|default:'' }}</textarea>
            </div>

            <div class="form-group">
                <label for="id_data_inicio">Data de início</label>
                <input
                    type="date"
                    name="data_inicio"
                    id="id_data_inicio"
                    value="{{ form_data.data_inicio|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="id_data_fim">Data final</label>
                <input
                    type="date"
                    name="data_fim"
                    id="id_data_fim"
                    value="{{ form_data.data_fim|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="id_local">Local</label>
                <input
                    type="text"
                    name="local"
                    id="id_local"
                    value="{{ form_data.local|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="id_status">Status</label>
                <select name="status" id="id_status" required>
                    <option value="">Selecione</option>
                    <option value="ativa" {% if form_data.status == 'ativa' %}selected{% endif %}>Ativa</option>
                    <option value="encerrada" {% if form_data.status == 'encerrada' %}selected{% endif %}>Encerrada</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    {% if is_edit %}Atualizar{% else %}Salvar{% endif %}
                </button>
                <a href="{% url 'campanhas' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
