{% extends 'base.html' %}

{% block title %}Meu Perfil{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 700px;
        margin: 40px auto;
    }

    .form-header {
        margin-bottom: 24px;
        text-align: center;
    }

    .form-header h2 {
        color: #1f4f82;
        margin-bottom: 8px;
    }

    .form-header p {
        color: #6b7280;
    }

    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
    }

    .form-actions .btn {
        min-width: 140px;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="card">
        <div class="form-header">
            <h2>Meu Perfil</h2>
            <p>Atualize seus dados cadastrais.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" value="{{ form_data.username|default:'' }}" required>
            </div>

            <div class="form-group">
                <label for="id_first_name">Nome</label>
                <input type="text" name="first_name" id="id_first_name" value="{{ form_data.first_name|default:'' }}" required>
            </div>

            <div class="form-group">
                <label for="id_last_name">Sobrenome</label>
                <input type="text" name="last_name" id="id_last_name" value="{{ form_data.last_name|default:'' }}" required>
            </div>

            <div class="form-group">
                <label for="id_email">Email</label>
                <input type="email" name="email" id="id_email" value="{{ form_data.email|default:'' }}" required>
            </div>

            <div class="form-group">
                <label for="id_password">Nova senha (opcional)</label>
                <input type="password" name="password" id="id_password">
            </div>

            <div class="form-group">
                <label for="id_telefone">Telefone</label>
                <input type="text" name="telefone" id="id_telefone" value="{{ form_data.telefone|default:'' }}" required>
            </div>

            <div class="form-group">
                <label for="id_endereco">Endereço</label>
                <input type="text" name="endereco" id="id_endereco" value="{{ form_data.endereco|default:'' }}">
            </div>

            <div class="form-group">
                <label for="id_disponibilidade">Disponibilidade</label>
                <input type="text" name="disponibilidade" id="id_disponibilidade" value="{{ form_data.disponibilidade|default:'' }}">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar alterações</button>
                <a href="{% url 'acoes_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
